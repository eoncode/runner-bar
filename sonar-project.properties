# Exclude exported design decks/artifacts from SonarCloud analysis.
# These are generated HTML/JS design files, not shipped application code,
# and were causing Quality Gate failures (ReDoS hotspots, missing SRI, duplication).
# See issue #1190.
sonar.exclusions=docs/design/**

# Suppress S1075 (hardcoded URI) in test files.
# Test fixtures intentionally use literal URIs as controlled inputs — these are not
# real smells. Suppressing at the rule level for Tests/** avoids ~36 false positives.
# See issue #1417.
# To add more suppressions: extend this comma-separated list (e.g. e1,e2)
# AND add the matching e2.ruleKey / e2.resourceKey pairs below.
# If only the new eN.* keys are added without updating this line, the new
# suppression silently has no effect.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=swift:S1075
sonar.issue.ignore.multicriteria.e1.resourceKey=Tests/**
