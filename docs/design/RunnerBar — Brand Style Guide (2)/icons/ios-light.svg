<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E6ED"/>
    </linearGradient>
    <linearGradient id="boltStroke" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%"  stop-color="#3FA1FF"/>
      <stop offset="55%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0058B8"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- Paper background -->
    <rect x="0" y="0" width="1024" height="1024" fill="url(#paper)"/>

    <!-- Soft shadow as offset stroked polygon at lower opacity -->
    <g transform="translate(520 528) scale(28) translate(-12 -12)" opacity="0.18">
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"
               fill="none" stroke="#0A2657" stroke-width="1.6"
               stroke-linejoin="round" stroke-linecap="round"/>
    </g>

    <!-- Bolt — outline only -->
    <g transform="translate(512 512) scale(28) translate(-12 -12)">
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"
               fill="none"
               stroke="url(#boltStroke)" stroke-width="1.4"
               stroke-linejoin="round" stroke-linecap="round"/>
    </g>
  </g>
</svg>
