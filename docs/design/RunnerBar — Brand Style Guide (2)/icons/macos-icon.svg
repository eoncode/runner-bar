<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>

    <!-- Background: deep ink with a soft blue glow from upper-left -->
    <radialGradient id="bgGlow" cx="30%" cy="22%" r="80%">
      <stop offset="0%"  stop-color="#1d4fa3"/>
      <stop offset="40%" stop-color="#0a2657"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>

    <!-- Subtle top sheen (Tahoe glass) -->
    <linearGradient id="topSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Bolt stroke gradient — Action Blue with brightening highlight -->
    <linearGradient id="boltStroke" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%"  stop-color="#7CC0FF"/>
      <stop offset="55%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0066D6"/>
    </linearGradient>

    <!-- Soft glow under the bolt -->
    <filter id="boltGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
    </filter>

    <!-- Blueprint grid -->
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- Background -->
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bgGlow)"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#grid)"/>

    <!-- Soft glow halo behind the bolt (stroked, blurred) -->
    <g transform="translate(512 512) scale(28) translate(-12 -12)" opacity="0.55">
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"
               fill="none" stroke="#0A84FF" stroke-width="2.2"
               stroke-linejoin="round" stroke-linecap="round"
               filter="url(#boltGlow)"/>
    </g>

    <!-- Main bolt — outline only -->
    <g transform="translate(512 512) scale(28) translate(-12 -12)">
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"
               fill="none"
               stroke="url(#boltStroke)" stroke-width="1.4"
               stroke-linejoin="round" stroke-linecap="round"/>
    </g>

    <!-- Top sheen for glassy Tahoe feel -->
    <rect x="0" y="0" width="1024" height="1024" fill="url(#topSheen)"/>
  </g>
</svg>
