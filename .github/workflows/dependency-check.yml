name: Dependency Check
on:
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday
  workflow_dispatch:

jobs:
  check-deps:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Check for outdated Swift packages
        uses: MarcoEidinger/swift-package-dependencies-check@a1fe86944db57c6be026e979f68a1f6b2c10c8b9  # v1
        with:
          failWhenOutdated: true

      - name: Scan for known vulnerabilities (OSV)
        uses: google/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: |-
            --lockfile=Package.resolved
