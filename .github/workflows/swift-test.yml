name: Swift Test

on:
  pull_request:

jobs:
  test:
    name: Swift Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2.4.0
        with:
          swift-version: "6.2"

      - name: Run tests
        run: swift test --filter RunnerBarCoreTests
