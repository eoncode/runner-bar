name: Swift Test

on:
  pull_request:

jobs:
  test:
    name: Swift Test
    runs-on: macos-15-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Run tests
        run: swift test --filter RunnerBarCoreTests
