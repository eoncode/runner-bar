name: Periphery Dead Code Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  periphery:
    name: Periphery
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Run Periphery scan
        run: periphery scan
