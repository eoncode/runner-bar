name: Periphery Dead Code Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  periphery:
    name: Periphery
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery@3.7.4

      - name: Run Periphery scan
        run: periphery scan --strict
