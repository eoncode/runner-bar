name: Periphery Dead Code Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  periphery:
    name: Periphery
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2.4.0
        with:
          swift-version: "6.2"

      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Run Periphery scan
        run: periphery scan
