name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # weekly Monday 03:00 UTC

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: macos-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift 6.2 toolchain
        run: |
          SWIFT_URL="https://download.swift.org/swift-6.2-release/xcode/swift-6.2-RELEASE/swift-6.2-RELEASE-osx.pkg"
          curl -L -o /tmp/swift.pkg "$SWIFT_URL"
          sudo installer -pkg /tmp/swift.pkg -target /
          TOOLCHAIN=$(find /Library/Developer/Toolchains -name '*.xctoolchain' -maxdepth 1 | sort -r | head -1)
          TOOLCHAIN_ID=$(plutil -extract CFBundleIdentifier raw "$TOOLCHAIN/Info.plist")
          SWIFT_BIN="$TOOLCHAIN/usr/bin"
          echo "TOOLCHAINS=$TOOLCHAIN_ID" >> "$GITHUB_ENV"
          echo "$SWIFT_BIN" >> "$GITHUB_PATH"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build
        run: |
          TOOLCHAIN=$(find /Library/Developer/Toolchains -name '*.xctoolchain' -maxdepth 1 | sort -r | head -1)
          export PATH="$TOOLCHAIN/usr/bin:$PATH"
          swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
