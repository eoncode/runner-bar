name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - '**/*.swift'
      - 'Package.swift'
  schedule:
    - cron: '0 3 * * 1'  # weekly Monday 03:00 UTC
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  analyze:
    name: CodeQL Analysis
    # Opt-in only: runs when commit message contains [run codeql],
    # on the weekly schedule, or via manual workflow_dispatch.
    # This prevents CodeQL from blocking the self-hosted runner on every push.
    #
    # Usage:
    #   git commit -m "fix: something [run codeql]"
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[run codeql]') ||
      contains(github.event.pull_request.head.commit.message, '[run codeql]')
    runs-on: macos-26
    permissions:
      actions: read
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache CodeQL bundle
        uses: actions/cache@v4
        with:
          path: ~/.codeql/packages
          key: codeql-swift-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/codeql.yml') }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: autobuild

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
