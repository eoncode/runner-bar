name: RunnerBar
options:
  bundleIdPrefix: com.eoncode
  deploymentTarget:
    macOS: "26.0"
  # XcodeGen generates Info.plist — no hand-written plist in this SPM-only project
  generateEmptyDirectories: true

packages:
  RunnerBarCore:
    path: .

targets:
  RunnerBar:
    type: application
    platform: macOS
    sources:
      - Sources/RunnerBar
    dependencies:
      - package: RunnerBarCore
        product: RunnerBarCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eoncode.runner-bar
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication

  RunnerBarUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - Tests/RunnerBarUITests
    dependencies:
      - target: RunnerBar
    settings:
      base:
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.eoncode.runner-bar.uitests
