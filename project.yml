name: RunBot
options:
  bundleIdPrefix: dev.eonist
  createIntermediateGroups: true

packages:
  RunBot:
    path: .

targets:
  RunBot:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Sources/RunBot
    resources:
      - Resources
    dependencies:
      - package: RunBot
        product: RunBotCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.eonist.runbot
        MACH_O_TYPE: mh_execute
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        AD_HOC_CODE_SIGNING_ALLOWED: YES
        INFOPLIST_FILE: Resources/Info.plist
        ARCHS: arm64
        EXCLUDED_ARCHS: x86_64
        # LSUIElement makes the app a menu bar agent (no Dock icon) in production.
        # It lives here as a build setting rather than in Info.plist so that it
        # is only applied to the RunBot app target. The RunBotUITests target
        # has its own generated plist and never inherits this key, meaning the app
        # launches as a normal foreground process during UI tests and app.windows
        # is fully visible to XCTest.
        # ❌ NEVER move this back into Resources/Info.plist.
        INFOPLIST_KEY_LSUIElement: YES

  RunBotUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Tests/RunBotUITests
    # CRITICAL: NO dependencies on RunBot here.
    # On Xcode 26, any target-level dependency from a bundle.ui-testing target
    # to an app target causes xcodebuild to auto-inject XCTTargetAppPath with
    # the .app extension stripped -> "bundle ID couldn't be read" fatal error.
    # The app is built in a separate xcodebuild step (see ui-tests.yml).
    # The test code uses XCUIApplication(bundleIdentifier:) + Launch Services
    # to locate the already-built .app at runtime.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.eonist.runbot.uitests
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        AD_HOC_CODE_SIGNING_ALLOWED: YES
        GENERATE_INFOPLIST_FILE: YES
        ARCHS: arm64
        EXCLUDED_ARCHS: x86_64

schemes:
  RunBot:
    build:
      targets:
        RunBot: all
    run:
      config: Debug

  # Dedicated UI test scheme.
  # CRITICAL: no testTargetApp key and RunBotUITests has no target dependency
  # on RunBot. Both together prevent Xcode 26 from auto-injecting
  # XCTTargetAppPath (which strips .app and breaks bundle ID lookup).
  # The RunBot app is built via a separate xcodebuild build step first.
  RunBotUITests:
    build:
      targets:
        RunBotUITests: [build, testing]
    test:
      targets:
        - name: RunBotUITests
          parallelizable: false
      environmentVariables:
        UI_TESTING: "1"
