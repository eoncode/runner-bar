name: RunnerBar
options:
  bundleIdPrefix: dev.eonist
  createIntermediateGroups: true

packages:
  RunnerBar:
    path: .

targets:
  RunnerBar:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Sources/RunnerBar
    resources:
      - Resources
    dependencies:
      - package: RunnerBar
        product: RunnerBarCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.eonist.runnerbar
        MACH_O_TYPE: mh_execute
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        AD_HOC_CODE_SIGNING_ALLOWED: YES
        INFOPLIST_FILE: Resources/Info.plist

  RunnerBarUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Tests/RunnerBarUITests
    dependencies:
      - target: RunnerBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.eonist.runnerbar.uitests
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        AD_HOC_CODE_SIGNING_ALLOWED: YES
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/RunnerBar.app/Contents/MacOS/RunnerBar
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  RunnerBar:
    build:
      targets:
        RunnerBar: all
        RunnerBarUITests: [testing]
    test:
      targets:
        - name: RunnerBarUITests
          parallelizable: false
      environmentVariables:
        XCTestObserverAlwaysShowShield: NO
        XCTTargetAppPath: $(BUILT_PRODUCTS_DIR)/RunnerBar.app
      commandLineArguments:
        UI_TESTING: true
    run:
      config: Debug
