name: RunnerBar
options:
  bundleIdPrefix: com.eoncode
  createIntermediateGroups: true

packages:
  RunnerBarCore:
    path: .

targets:
  RunnerBar:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Sources/RunnerBar
    resources:
      - Resources
    dependencies:
      - package: RunnerBarCore
        product: RunnerBarCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eoncode.RunnerBar
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        AD_HOC_CODE_SIGNING_ALLOWED: YES
        INFOPLIST_FILE: Resources/Info.plist

  RunnerBarUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Tests/RunnerBarUITests
    dependencies:
      - target: RunnerBar
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: YES
        AD_HOC_CODE_SIGNING_ALLOWED: YES
        GENERATE_INFOPLIST_FILE: YES
