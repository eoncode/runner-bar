name: RunnerBar
options:
  bundleIdPrefix: dev.eonist
  createIntermediateGroups: true

packages:
  RunnerBar:
    path: .

targets:
  RunnerBar:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Sources/RunnerBar
    resources:
      - Resources
    dependencies:
      - package: RunnerBar
        product: RunnerBarCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.eonist.runnerbar
        MACH_O_TYPE: mh_execute
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        AD_HOC_CODE_SIGNING_ALLOWED: YES
        INFOPLIST_FILE: Resources/Info.plist

  RunnerBarUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - Tests/RunnerBarUITests
    dependencies:
      - target: RunnerBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.eonist.runnerbar.uitests
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        AD_HOC_CODE_SIGNING_ALLOWED: YES
        GENERATE_INFOPLIST_FILE: YES

schemes:
  RunnerBar:
    build:
      targets:
        RunnerBar: all
    run:
      config: Debug

  # Separate scheme for UI tests.
  # CRITICAL: no testTargetApp key here — omitting it prevents xcodebuild from
  # auto-populating XCTTargetAppPath. On Xcode 26 that path has its .app
  # extension stripped, causing a fatal "bundle ID couldn't be read" error.
  # The test code uses XCUIApplication(bundleIdentifier:) + Launch Services
  # to locate the app — no path injection needed.
  RunnerBarUITests:
    build:
      targets:
        RunnerBar: [build]
        RunnerBarUITests: [build, testing]
    test:
      targets:
        - name: RunnerBarUITests
          parallelizable: false
      environmentVariables:
        # UI_TESTING must be an env var (not a commandLineArgument) so that
        # ProcessInfo.processInfo.environment["UI_TESTING"] sees it in the app.
        UI_TESTING: "1"
