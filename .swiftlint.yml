# SwiftLint configuration for runner-bar
# https://github.com/realm/SwiftLint

included:
  - Sources

excluded:
  - .build
  - Package.swift
  - Tests

# ── Opt-in rules ─────────────────────────────────────────────────────────────────────────────────────────────────────
opt_in_rules:
  - closure_spacing        # consistent spacing inside closure braces
  - explicit_init          # disallow explicit .init() calls where redundant

  - sorted_imports         # keep import statements sorted
  - vertical_whitespace_closing_braces  # no blank line before closing brace
  - collection_alignment   # align collection literal elements
  - contains_over_filter_count  # prefer contains over filter().count
  - contains_over_filter_is_empty  # prefer contains over filter().isEmpty
  - empty_collection_literal  # prefer isEmpty over == []
  - first_where            # prefer first(where:) over filter().first
  - missing_docs           # require /// doc comments on all declarations
  - file_header            # enforce standard file header format

# ── Rule configuration ────────────────────────────────────────────────────────────────────────────────────────────────────────
nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

identifier_name:
  min_length: 2
  excluded:
    - id  # ubiquitous Swift/SwiftUI identifier
    - x   # geometric coordinate
    - y   # geometric coordinate
    - w   # geometric width
    - h   # geometric height
    - i   # loop index (conventional)
    - j   # loop index (conventional)
    - k   # loop index (conventional)
    - n   # count/size (conventional in algorithms)

missing_docs:
  warning: [open, public, internal, private, fileprivate]
  excludes_extensions: false
  excludes_inherited_types: false

file_header:
  required_pattern: "^// [\\w+]+\\.swift\\n// RunnerBar"

# ── Disabled rules ────────────────────────────────────────────────────────────────────────────────────────────────────────
disabled_rules:
  - todo                                    # TODOs are acceptable during active development
  - trailing_comma                          # SwiftPM/Xcode auto-formatter conflicts with this
  # identifier_name re-enabled with min_length: 2 — see config block below
  # opening_brace re-enabled — PR #205 fixed these
  # colon re-enabled — PR #205 did a full sweep
  - cyclomatic_complexity                   # complex dispatch/switch functions are acceptable
  - file_length                             # large files are acceptable during active development
  - superfluous_disable_command             # in-file disables may pre-empt future violations
  - line_length                             # long lines are acceptable in this codebase
  - function_body_length                    # long view bodies are acceptable in SwiftUI
  # operator_usage_whitespace re-enabled — PR #205 fixed these
  - vertical_whitespace_opening_braces      # conflicts with SwiftUI DSL patterns
  - multiple_closures_with_trailing_closure # SwiftUI DSL routinely uses multiple trailing closures
  - function_parameter_count                # large model inits are acceptable in this codebase
  - type_body_length                        # large types are acceptable; tracked for Phase 2 re-enable in #1406
