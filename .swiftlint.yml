# SwiftLint configuration for run-bot
# https://github.com/realm/SwiftLint

included:
  - Sources

excluded:
  - .build
  - Package.swift
  - Tests

# ── Opt-in rules ─────────────────────────────────────────────────────────────────────────────────────────────────────
opt_in_rules:
  - closure_spacing        # consistent spacing inside closure braces
  - explicit_init          # disallow explicit .init() calls where redundant

  - sorted_imports         # keep import statements sorted
  - vertical_whitespace_closing_braces  # no blank line before closing brace
  - collection_alignment   # align collection literal elements
  - contains_over_filter_count  # prefer contains over filter().count
  - contains_over_filter_is_empty  # prefer contains over filter().isEmpty
  - empty_collection_literal  # prefer isEmpty over == []
  - first_where            # prefer first(where:) over filter().first
  - missing_docs           # require /// doc comments on all declarations
  - file_header            # enforce standard file header format

# ── Rule configuration ────────────────────────────────────────────────────────────────────────────────────────────────────────
nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

identifier_name:
  min_length: 2
  excluded:
    - id  # ubiquitous Swift/SwiftUI identifier
    - x   # geometric coordinate
    - y   # geometric coordinate
    - w   # geometric width
    - h   # geometric height
    - i   # loop index (conventional)
    - j   # loop index (conventional)
    - k   # loop index (conventional)
    - n   # count/size (conventional in algorithms)

missing_docs:
  warning: [open, public, internal, private, fileprivate]
  excludes_extensions: false
  excludes_inherited_types: false

file_header:
  # Line 2 is the module name. Historically every module was named RunBot*, but
  # the AppUpdater library target (a host-agnostic module with no RunBot in its
  # name) is a legitimate exception, so its module name is allowed here too.
  required_pattern: "^// [\\w+]+\\.swift\\n// (RunBot|AppUpdater)"

# ── Disabled rules ────────────────────────────────────────────────────────────────────────────────────────────────────────
disabled_rules:
  - todo                                    # TODOs are acceptable during active development
  - trailing_comma                          # SwiftPM/Xcode auto-formatter conflicts with this
  # identifier_name re-enabled with min_length: 2 — see config block below
  # opening_brace re-enabled — PR #205 fixed these
  # colon re-enabled — PR #205 did a full sweep
  # cyclomatic_complexity re-enabled with warning: 17 (target 15 in #1406)
  # file_length re-enabled with warning: 620, error: 800 (target 500 in #1406)
  # superfluous_disable_command re-enabled — stale suppressions now caught by CI
  # line_length re-enabled with warning: 200, error: 240 (target 160 in #1406)
  # function_body_length re-enabled with warning: 90 (target 80 in #1406)
  # operator_usage_whitespace re-enabled — PR #205 fixed these
  - vertical_whitespace_opening_braces      # conflicts with SwiftUI DSL patterns
  - multiple_closures_with_trailing_closure # SwiftUI DSL routinely uses multiple trailing closures
  # function_parameter_count re-enabled with warning: 6, error: 8 — tracked in #1406
  # type_body_length re-enabled with warning: 400 — tracked in #1406

line_length:
  warning: 200   # tightened from 240 (phase 1) → target 160 tracked in #1406
  error: 240

file_length:
  warning: 620   # tightened from 800 (phase 1) → target 500 tracked in #1406
  error: 800

cyclomatic_complexity:
  warning: 17    # tightened from 20 (phase 1) → target 15 tracked in #1406
  error: 30      # explicit ceiling; SwiftLint default is 20

function_body_length:
  warning: 90    # tightened from 120 (phase 1) → target 80 tracked in #1406
  error: 150     # explicit ceiling; SwiftLint default is 200

type_body_length:
  warning: 400
  error: 600    # explicit ceiling; tighten toward 400 in phase 3 — tracked in #1406

function_parameter_count:
  warning: 6
  error: 8
