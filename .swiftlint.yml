# SwiftLint configuration for runner-bar
# https://github.com/realm/SwiftLint

included:
  - Sources

excluded:
  - .build
  - Package.swift

# ── Opt-in rules ────────────────────────────────────────────────────────────────────────
opt_in_rules:
  - closure_spacing
  - explicit_init
  - operator_usage_whitespace
  - sorted_imports
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - first_where

# ── Rule configuration ───────────────────────────────────────────────────────────────────
line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 200
  error: 350

function_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

# ── Disabled rules ───────────────────────────────────────────────────────────────────────
disabled_rules:
  - todo
  - trailing_comma
  - missing_docs
  - orphaned_doc_comment
  - superfluous_disable_command
