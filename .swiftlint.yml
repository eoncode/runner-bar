# SwiftLint configuration for runner-bar
# https://github.com/realm/SwiftLint

included:
  - Sources

excluded:
  - .build
  - Package.swift

# ── Opt-in rules ────────────────────────────────────────────────────────────────────────
opt_in_rules:
  - explicit_init
  - operator_usage_whitespace
  - sorted_imports
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - first_where

# ── Rule configuration ───────────────────────────────────────────────────────────────────
line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 800

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 40
    error: 60

# ── Disabled rules ───────────────────────────────────────────────────────────────────────
disabled_rules:
  - missing_docs
  - todo
  - trailing_comma
  - multiple_closures_with_trailing_closure
  - blanket_disable_command
  - superfluous_disable_command
  - colon
  - comma
  - opening_brace
  - large_tuple
  - vertical_whitespace_opening_braces
  - implicit_optional_initialization
  - closure_spacing
